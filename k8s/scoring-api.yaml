apiVersion: apps/v1
kind: Deployment
metadata:
  name: scoring-api
  namespace: gbm-cs
  labels:
    app: scoring-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scoring-api
  template:
    metadata:
      labels:
        app: scoring-api
    spec:
      containers:
        - name: api
          image: gbm-cs/scoring-api:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          volumeMounts:
            - name: gcs-sa
              mountPath: /var/secrets/gcs
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1500Mi"
      volumes:
        - name: gcs-sa
          secret:
            secretName: gcs-sa
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: scoring-api
  namespace: gbm-cs
spec:
  type: NodePort
  selector:
    app: scoring-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
