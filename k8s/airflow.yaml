# Airflow standalone — webserver + scheduler + SQLite + sequential executor in one pod.
# Suitable for MVS / dev. State is ephemeral (pod restart resets the metadata DB).
# For production GKE, swap this for the official apache-airflow Helm chart.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow
  namespace: gbm-cs
  labels:
    app: airflow
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: airflow
  template:
    metadata:
      labels:
        app: airflow
    spec:
      containers:
        - name: airflow
          image: gbm-cs/airflow:dev
          imagePullPolicy: IfNotPresent
          command: ["bash", "-lc", "airflow standalone"]
          env:
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "False"
            - name: AIRFLOW__WEBSERVER__EXPOSE_CONFIG
              value: "False"
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: gcs-sa
              mountPath: /var/secrets/gcs
              readOnly: true
          resources:
            requests:
              cpu: "200m"
              memory: "1Gi"
            limits:
              cpu: "1500m"
              memory: "2Gi"
      volumes:
        - name: gcs-sa
          secret:
            secretName: gcs-sa
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: airflow
  namespace: gbm-cs
spec:
  type: NodePort
  selector:
    app: airflow
  ports:
    - name: http
      port: 8080
      targetPort: 8080
