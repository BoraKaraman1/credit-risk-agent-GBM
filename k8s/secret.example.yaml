# Copy to secret.yaml and fill in values. secret.yaml is gitignored.
#
# DATABASE_URL: Cloud SQL or Supabase connection string.
#   For Cloud SQL on GKE, prefer the Cloud SQL Auth Proxy as a sidecar and use
#   127.0.0.1 here. For Minikube + Cloud SQL, use the public IP + authorized
#   networks, or run cloud-sql-proxy on the host and tunnel through.
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: gbm-cs
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:password@host:5432/dbname"
---
# Optional. Skip if not using GCS, or use Workload Identity on GKE instead.
# Create with:
#   kubectl create secret generic gcs-sa -n gbm-cs --from-file=key.json=/path/to/sa.json
apiVersion: v1
kind: Secret
metadata:
  name: gcs-sa
  namespace: gbm-cs
type: Opaque
stringData:
  key.json: |
    {"type": "service_account", "...": "replace with real key or use kubectl --from-file"}
