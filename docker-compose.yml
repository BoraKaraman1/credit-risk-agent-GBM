# Local development stack. The credentials and published ports below are
# convenience defaults for local use ONLY — not for production. Supply real
# secrets via a .env file (POSTGRES_PASSWORD, API_KEYS, GRAFANA_ADMIN_PASSWORD)
# and restrict or remove the published ports before any shared deployment.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-credit_risk}
      POSTGRES_USER: ${POSTGRES_USER:-credit_risk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-credit_risk}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./pipeline/supabase_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-credit_risk} -d ${POSTGRES_DB:-credit_risk}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-credit_risk}:${POSTGRES_PASSWORD:-credit_risk}@postgres:5432/${POSTGRES_DB:-credit_risk}
      CREDIT_RISK_MODELS_DIR: /models
      LOG_LEVEL: INFO
      PORT: 8000
      # Authentication is required by default (the API fails closed
      # otherwise). Override with your own keys via a .env file
      # (API_KEYS=key1,key2); never ship this demo key to production.
      API_KEYS: ${API_KEYS:-demo-local-key}
      # The first (bootstrap) champion is REVIEW REQUIRED — structural
      # disparities in the public LendingClub data (see the champion's
      # model_card.md). The governance gate therefore fails closed by
      # default; to run the demo you must explicitly accept serving an
      # unapproved model, e.g.:
      #   ALLOW_UNAPPROVED_MODEL=true docker compose up
      # After the first promotion, challenger exports are judged
      # champion-relative and can be APPROVED, making this unnecessary.
      ALLOW_UNAPPROVED_MODEL: ${ALLOW_UNAPPROVED_MODEL:-}
    ports:
      - "8000:8000"
    volumes:
      - ./data/models:/models:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    environment:
      API_URL: http://api:8000
      # Must be ONE key from the api service's API_KEYS list. When you
      # override API_KEYS, also set UI_API_KEY to one of those keys.
      API_KEY: ${UI_API_KEY:-demo-local-key}
      DATABASE_URL: postgresql://${POSTGRES_USER:-credit_risk}:${POSTGRES_PASSWORD:-credit_risk}@postgres:5432/${POSTGRES_DB:-credit_risk}
      # The model card ships inside the champion model directory
      # (promoted there by gbm promote), so the governance page always
      # shows the card of the model actually being served.
      MODEL_CARD_PATH: data/models/champion/model_card.md
    # Governance page reads the published champion artifacts read-only
    # (WORKDIR is /app).
    volumes:
      - ./data/models:/app/data/models:ro
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy

  airflow:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    profiles: ["orchestration"]
    # Single-container dev mode: SQLite metadata DB + LocalExecutor-ish
    # scheduler + webserver on :8080 (admin password printed in the logs).
    command: standalone
    environment:
      # Used by the gbm tasks (sync, monitors) the DAGs shell out to.
      DATABASE_URL: postgresql://${POSTGRES_USER:-credit_risk}:${POSTGRES_PASSWORD:-credit_risk}@postgres:5432/${POSTGRES_DB:-credit_risk}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      # For `docker compose exec airflow gbm promote`: promotion
      # preflights /reload, swaps the registry, and verifies the API
      # activated the exact version. The key must be in API_KEYS.
      SCORING_API_URL: http://api:8000
      API_KEYS: ${API_KEYS:-demo-local-key}
    ports:
      - "8080:8080"
    volumes:
      # The image ships code only (.dockerignore excludes data/); the
      # medallion layers and model registry live on the host and must be
      # mounted at the path CREDIT_RISK_DATA_DIR points to.
      - ./data:/opt/airflow/data
    depends_on:
      postgres:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: ["monitoring"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.2.0
    profiles: ["monitoring"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
