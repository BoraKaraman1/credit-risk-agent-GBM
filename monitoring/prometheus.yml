global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: scoring-api
    metrics_path: /metrics
    # /metrics requires authentication. The credential must match one of
    # the API_KEYS configured for the api service (demo default below).
    authorization:
      type: Bearer
      credentials: demo-local-key
    static_configs:
      - targets: ["api:8000"]
