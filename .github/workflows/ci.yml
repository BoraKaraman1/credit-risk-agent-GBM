name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: Go vet, fmt, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum
      - name: go vet
        run: go vet ./...
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:" "$unformatted"
            exit 1
          fi
      - name: go test
        run: go test ./...
      - name: go test -race
        run: go test -race ./...
      - name: govulncheck
        # Report-only: surfaces known vulnerabilities in called code paths
        # without blocking (dependencies are pinned, not yet upgraded).
        continue-on-error: true
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  python:
    name: Python lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/*.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c requirements/constraints.txt -r requirements/test.txt ruff
      - name: ruff
        run: ruff check pipeline tests dags ui agents
      - name: pytest
        run: python -m pytest tests/ -q
      - name: pip-audit
        # Report-only: audits the pinned dependency set for known
        # advisories without blocking (deps are pinned, not yet upgraded).
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements/constraints.txt

  airflow-dags:
    name: Airflow DAG validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/*.txt
      - name: Install Airflow and pipeline dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "apache-airflow==2.8.4" -r requirements/pipeline.txt \
            --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.8.4/constraints-3.11.txt"
          pip install "pytest>=8.0"
      - name: Parse and validate DAGs
        run: python -m pytest tests/test_dags.py -q

  docker:
    name: Docker build + smoke (${{ matrix.dockerfile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Every image is built AND run: a build proves the Dockerfile
        # parses, only the smoke proves the image works (a missing file
        # or broken import fails here, not at deploy time). None of the
        # smokes need data/ (absent from CI checkouts).
        include:
          - dockerfile: Dockerfile.api
            # gbm with no args prints usage and exits 2 — proves the
            # binary executes on the runtime base image.
            smoke: docker run --rm --entrypoint sh smoke-image -c 'gbm; [ $? -eq 2 ]'
          - dockerfile: Dockerfile.pipeline
            # Imports exercise the eager contract.json load and the full
            # scientific-stack import chain.
            smoke: docker run --rm smoke-image python -c "import pipeline.train, pipeline.export_model_json, pipeline.reject_inference"
          - dockerfile: Dockerfile.test
            # The image's own CMD: the entire pytest suite, in-image.
            smoke: docker run --rm smoke-image
          - dockerfile: Dockerfile.airflow
            # Importing the DAG modules parses both DAGs under the real
            # Airflow install (PYTHONPATH=/opt/airflow in the image).
            smoke: docker run --rm --entrypoint python smoke-image -c "import pipeline.config, agents.review_agent, dags.credit_risk_pipeline, dags.credit_risk_monitoring"
          - dockerfile: Dockerfile.ui
            # ui.core loads the contract; never import ui.app (it runs
            # streamlit navigation at import).
            smoke: docker run --rm smoke-image python -c "from ui import core, services"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          # load + tag so the smoke step can docker-run the image (the
          # buildx container driver does not expose it to the daemon
          # otherwise).
          load: true
          tags: smoke-image
          cache-from: type=gha,scope=${{ matrix.dockerfile }}
          cache-to: type=gha,mode=max,scope=${{ matrix.dockerfile }}
      - name: Smoke run
        run: ${{ matrix.smoke }}

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      # Full history: a credential committed in the past must fail the
      # scan even after it is removed from the working tree.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
