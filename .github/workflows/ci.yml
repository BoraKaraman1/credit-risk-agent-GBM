name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: Go vet, fmt, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum
      - name: go vet
        run: go vet ./...
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:" "$unformatted"
            exit 1
          fi
      - name: go test
        run: go test ./...
      - name: go test -race
        run: go test -race ./...
      - name: govulncheck
        # Report-only: surfaces known vulnerabilities in called code paths
        # without blocking (dependencies are pinned, not yet upgraded).
        continue-on-error: true
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  python:
    name: Python lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/*.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c requirements/constraints.txt -r requirements/test.txt ruff
      - name: ruff
        run: ruff check pipeline tests dags
      - name: pytest
        run: python -m pytest tests/ -q
      - name: pip-audit
        # Report-only: audits the pinned dependency set for known
        # advisories without blocking (deps are pinned, not yet upgraded).
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements/constraints.txt

  docker:
    name: Docker build (${{ matrix.dockerfile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - Dockerfile.api
          - Dockerfile.pipeline
          - Dockerfile.test
          - Dockerfile.airflow
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha,scope=${{ matrix.dockerfile }}
          cache-to: type=gha,mode=max,scope=${{ matrix.dockerfile }}
